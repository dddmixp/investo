name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  # Auto-review every PR — runs Claude directly and posts result as a comment
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Run Claude code review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code@latest \
            --allowedTools "Read,Glob,Grep,Bash" \
            --print \
            "You are the code-reviewer agent for Investo. Follow .claude/agents/code-reviewer.md exactly.

          Get the diff with: git diff origin/main...HEAD

          Output format — one finding per line:
          path/to/file.ts:42: 🔴 CRITICAL: <problem>. <fix>.
          path/to/file.ts:17: 🟠 MAJOR: <problem>. <fix>.
          path/to/file.ts:88: 🟡 MINOR: <problem>. <fix>.
          path/to/file.ts:5:  💬 SUGGESTION: <problem>. <fix>.

          End with exactly one verdict line: APPROVE, REQUEST CHANGES, or BLOCK." \
            > /tmp/review-output.txt 2>&1
          cat /tmp/review-output.txt

      - name: Post review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(cat /tmp/review-output.txt)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --method POST \
            -f body="## 🤖 Claude Code Review

          $BODY"

  # Responds to @claude mentions in comments — for Q&A on PRs/issues
  claude-respond:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Get PR branch if comment is on a PR
        id: pr-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} --jq '.pull_request.url // empty')
          if [ -n "$PR_URL" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            PR_REF=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.ref')
            echo "ref=$PR_REF" >> $GITHUB_OUTPUT
          else
            echo "ref=" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-ref.outputs.ref || github.event.repository.default_branch }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Agent Worker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  pick-and-implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Find oldest agent-ready issue
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list \
            --label agent-ready \
            --state open \
            --limit 1 \
            --json number,title,body \
            --jq '.[0]')
          if [ -z "$ISSUE" ] || [ "$ISSUE" = "null" ]; then
            echo "No agent-ready issues found. Exiting."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "found=true" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
          echo "number=$(echo $ISSUE | jq -r '.number')" >> $GITHUB_OUTPUT
          echo "title=$(echo $ISSUE | jq -r '.title')" >> $GITHUB_OUTPUT

      - name: Claim issue
        if: steps.find-issue.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "Agent worker claimed this issue. Working on it..."
          gh issue edit $ISSUE_NUMBER --remove-label agent-ready --add-label agent-in-progress

      - uses: actions/setup-node@v4.4.0
        if: steps.find-issue.outputs.found == 'true'
        with:
          node-version: 22

      - name: Run developer agent
        if: steps.find-issue.outputs.found == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.find-issue.outputs.title }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
          BRANCH="agent/${ISSUE_NUMBER}-${SLUG}"

          git config user.email "agent-worker@investo"
          git config user.name "Agent Worker"
          git checkout -b "$BRANCH"

          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER --json body --jq '.body')

          npx claude@latest \
            --agent developer \
            --print \
            "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Implement this issue following all rules in CLAUDE.md and .claude/agents/developer.md.
          Branch is already created: ${BRANCH}. After implementation, open a PR referencing issue #${ISSUE_NUMBER}."

      - name: Handle failure
        if: failure() && steps.find-issue.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --body "Agent worker failed on this issue. Check workflow run ${{ github.run_id }} for details. Resetting to agent-ready for next run."
          gh issue edit $ISSUE_NUMBER --remove-label agent-in-progress --add-label agent-ready

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      staging-url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (staging)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          npx vercel build --token=$VERCEL_TOKEN
          URL=$(npx vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $URL"

      - name: Run e2e smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          npm ci
          npx playwright install chromium
          npm run test:e2e

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Promote to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging-url }}
        run: |
          DEPLOYMENT_ID=$(npx vercel inspect "$STAGING_URL" --token=$VERCEL_TOKEN --json 2>/dev/null | jq -r '.id' || echo "")
          if [ -n "$DEPLOYMENT_ID" ]; then
            npx vercel promote "$DEPLOYMENT_ID" --token=$VERCEL_TOKEN --yes
          else
            npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            npx vercel build --prod --token=$VERCEL_TOKEN
            npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          fi
